services:
  clicklikua.backend:
    image: clicklikua.backend
    build:
      context: ./backend
      dockerfile: src/Host/Dockerfile
    depends_on:
      clicklikua.database:
        condition: service_healthy
    ports:
      - "80:3000"
    environment:
      ASPNETCORE_ENVIRONMENT: Staging
      ASPNETCORE_URLS: "http://0.0.0.0:3000"
      ConnectionStrings__Database: Host=clicklikua.database;Port=5432;Database=clicklikua.database;Username=clicklikua.user;Password=${DB_PASSWORD}

  clicklikua.database:
    image: postgres:15
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U clicklikua.user -d clicklikua.database" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - pgdata:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: "clicklikua.user"
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: "clicklikua.database"
      
  clicklikua.frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        BUILD_ENV: stage
    ports:
      - "8080:80"
    depends_on:
      - clicklikua.backend

  clicklikua.seq:
    image: datalust/seq:latest
    container_name: clicklikua.seq
    ports:
      - "5341:80"
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_ADMINUSERNAME: "admin"
      SEQ_FIRSTRUN_ADMINPASSWORD: "${SEQ_PASSWORD}"
    volumes:
      - seqdata:/data

volumes:
  pgdata:
  seqdata: